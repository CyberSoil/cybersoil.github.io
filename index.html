<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алексей Акбиев</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --gray: #86868b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            max-width: 680px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }
        
        header {
            margin-bottom: 60px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: #000;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 600;
        }
        
        h1 {
            font-size: 42px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 20px;
            color: var(--gray);
            margin-bottom: 40px;
        }
        
        .info-card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            margin-bottom: 40px;
        }
        
        .datetime {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        
        .weather {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            font-size: 32px;
            margin: 20px 0;
        }
        
        .temp {
            font-size: 56px;
            font-weight: 600;
            letter-spacing: -2px;
        }
        
        .description {
            font-size: 19px;
            color: var(--gray);
            margin-top: 8px;
        }
        
        .contact {
            margin-top: 40px;
        }
        
        .phone {
            font-size: 24px;
            font-weight: 500;
            color: #0071e3;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .phone:hover {
            opacity: 0.8;
        }
        
        footer {
            margin-top: 60px;
            color: var(--gray);
            font-size: 14px;
        }
        
        .apple-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #86868b;
            border-radius: 50%;
            margin: 0 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">A</div>
            <h1>Алексей Акбиев</h1>
            <p class="subtitle">Специалист • Нягань</p>
        </header>

        <div class="info-card">
            <div class="datetime" id="datetime"></div>
            
            <div class="weather">
                <span id="weather-icon">☀️</span>
                <span class="temp" id="temperature">--°</span>
            </div>
            <div class="description" id="weather-desc">Загрузка погоды...</div>
        </div>

        <div class="contact">
            <a href="tel:+79227807175" class="phone">+7 922 780-71-75</a>
        </div>

        <footer>
            Нягань • 2026
        </footer>
    </div>

    <script>
        // Обновление времени и даты
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            const formatted = now.toLocaleDateString('ru-RU', options).replace(',', '');
            document.getElementById('datetime').textContent = formatted;
        }

        // Погода через Open-Meteo
        async function loadWeather() {
            const lat = 62.14;
            const lon = 65.39;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=Asia/Yekaterinburg`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                const temp = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;
                
                document.getElementById('temperature').textContent = temp + '°';
                
                // Простая интерпретация кода погоды
                let desc = "Ясно";
                let icon = "☀️";
                
                if ([3, 45, 48].includes(code)) { desc = "Облачно"; icon = "☁️"; }
                else if ([51, 53, 55, 61, 63, 65].includes(code)) { desc = "Дождь"; icon = "🌧️"; }
                else if ([71, 73, 75, 77].includes(code)) { desc = "Снег"; icon = "❄️"; }
                else if ([80, 81, 82].includes(code)) { desc = "Ливень"; icon = "🌦️"; }
                
                document.getElementById('weather-desc').textContent = desc;
                document.getElementById('weather-icon').textContent = icon;
                
            } catch (e) {
                document.getElementById('weather-desc').textContent = "Не удалось загрузить погоду";
            }
        }

        // Запуск
        window.onload = () => {
            updateDateTime();
            setInterval(updateDateTime, 30000); // обновление каждые 30 сек
            loadWeather();
        };
    </script>
</body>
</html>
