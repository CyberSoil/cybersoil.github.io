<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алексей Акбиев — Официальный сайт</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --gray: #86868b;
            --accent: #0071e3;
            --card-bg: #ffffff;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            max-width: 680px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }
        
        header {
            margin-bottom: 48px;
        }
        
        .logo {
            width: 88px;
            height: 88px;
            background: var(--text);
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 36px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            transition: var(--transition);
        }

        .logo:hover {
            transform: scale(1.04);
        }
        
        h1 {
            font-size: 42px;
            font-weight: 600;
            letter-spacing: -0.8px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 20px;
            color: var(--gray);
            font-weight: 400;
        }
        
        .info-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            margin-bottom: 40px;
            transition: var(--transition);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .info-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
        }
        
        .datetime {
            font-size: 28px;
            font-weight: 500;
            letter-spacing: -0.5px;
            line-height: 1.4;
            min-height: 78px; /* Предотвращает скачок верстки при загрузке */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .datetime::first-letter {
            text-transform: uppercase;
        }
        
        .contact {
            margin-top: 32px;
        }
        
        .phone {
            font-size: 26px;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
            display: inline-block;
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: 12px;
        }
        
        .phone:hover {
            background: rgba(0, 113, 227, 0.05);
            transform: scale(1.02);
        }

        .phone:active {
            transform: scale(0.98);
        }
        
        footer {
            margin-top: 56px;
            color: var(--gray);
            font-size: 14px;
            letter-spacing: -0.1px;
        }

        /* Адаптивность для мобильных экранов */
        @media (max-width: 480px) {
            h1 { font-size: 32px; }
            .subtitle { font-size: 18px; }
            .info-card { padding: 32px 20px; }
            .datetime { font-size: 22px; min-height: 62px; }
            .phone { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">A</div>
            <h1>Алексей Акбиев</h1>
            <p class="subtitle">Нягань</p>
        </header>

        <main>
            <div class="info-card">
                <div class="datetime" id="datetime">Загрузка времени...</div>
            </div>

            <div class="contact">
                <a href="tel:+79227807175" class="phone">+7 922 780-71-75</a>
            </div>
        </main>

        <footer>
            Нягань • 2026
        </footer>
    </div>

    <script>
        function updateDateTime() {
            const datetimeElement = document.getElementById('datetime');
            if (!datetimeElement) return;

            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            
            try {
                let formatted = now.toLocaleDateString('ru-RU', options);
                // Заменяем запятую после года на красивую точку-разделитель
                formatted = formatted.replace(',', ' •');
                datetimeElement.textContent = formatted;
            } catch (e) {
                console.error("Ошибка форматирования даты:", e);
            }
        }

        // Инициализация при полной готовности DOM tree
        document.addEventListener('DOMContentLoaded', () => {
            updateDateTime();
            // Интервал 1000мс (1 сек) гарантирует точность обновления минут без задержек
            setInterval(updateDateTime, 1000); 
        });
    </script>
</body>
</html>
