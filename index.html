<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нягань | Визитка</title>
    <!-- Подключаем шрифт в стиле Apple (Geist или Интер) -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow: hidden;
        }

        /* Тонкая верхняя линия в стиле сайтов Apple */
        header {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: #86868b;
            text-transform: uppercase;
        }

        /* Главный виджет по центру */
        .widget-container {
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .time {
            font-size: 96px;
            font-weight: 500;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #ffffff 0%, #bcbcbc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date {
            font-size: 24px;
            font-weight: 400;
            color: #86868b;
            margin-bottom: 24px;
            letter-spacing: -0.01em;
        }

        .weather-box {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .weather-temp {
            font-size: 20px;
            font-weight: 500;
        }

        .weather-desc {
            font-size: 16px;
            color: #86868b;
        }

        /* Нижняя часть: Кнопка-контакты */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 320px;
        }

        .phone-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-size: 17px;
            font-weight: 500;
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            letter-spacing: -0.01em;
            box-shadow: 0 4px 30px rgba(255, 255, 255, 0.05);
        }

        .phone-btn:hover {
            transform: scale(1.02);
            background: #f5f5f7;
        }

        .phone-btn:active {
            transform: scale(0.98);
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Адаптивность под мобильные экраны */
        @media (max-width: 480px) {
            .time { font-size: 72px; }
            .date { font-size: 20px; }
            body { padding: 30px 15px; }
        }
    </style>
</head>
<body>

    <header>Нягань</header>

    <div class="widget-container">
        <!-- Время и дата -->
        <div class="time" id="time">00:00</div>
        <div class="date" id="date">Загрузка даты...</div>

        <!-- Виджет погоды -->
        <div class="weather-box">
            <span class="weather-temp" id="temp">--°C</span>
            <span class="weather-desc" id="desc">Обновление...</span>
        </div>
    </div>

    <footer>
        <!-- Кнопка вызова -->
        <a href="tel:+79227807175" class="phone-btn">+7 (922) 780-71-75</a>
    </footer>

    <script>
        // Функция обновления часов и даты
        function updateClock() {
            const now = new Date();
            
            // Настройка времени для часового пояса Нягани (Екатеринбург, UTC+5)
            const timeOptions = { timeZone: 'Asia/Yekaterinburg', hour: '2-digit', minute: '2-digit' };
            document.getElementById('time').innerText = now.toLocaleTimeString('ru-RU', timeOptions);

            // Настройка даты
            const dateOptions = { timeZone: 'Asia/Yekaterinburg', weekday: 'long', day: 'numeric', month: 'long' };
            let dateStr = now.toLocaleDateString('ru-RU', dateOptions);
            // Делаем первую букву дня недели заглавной в стиле Apple
            document.getElementById('date').innerText = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        }

        // Функция загрузки погоды в Нягани через бесплатный API (wttr.in)
        async function fetchWeather() {
            try {
                // Запрашиваем данные в формате JSON для Нягани на русском языке
                const response = await fetch('https://wttr.in');
                const data = await response.json();
                
                const currentCondition = data.current_condition[0];
                const temp = currentCondition.temp_C;
                const desc = currentCondition.lang_ru[0].value;

                document.getElementById('temp').innerText = `${temp > 0 ? '+' : ''}${temp}°C`;
                document.getElementById('desc').innerText = desc.toLowerCase();
            } catch (error) {
                document.getElementById('temp').innerText = '--°C';
                document.getElementById('desc').innerText = 'Погода временно недоступна';
            }
        }

        // Запуск процессов
        setInterval(updateClock, 1000);
        updateClock();
        
        fetchWeather();
        // Обновляем погоду каждые 15 минут, чтобы не нагружать сайт
        setInterval(fetchWeather, 900000);
    </script>
</body>
</html>
