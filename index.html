<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Нягань</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap');

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
  }

  :root {
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.06);
    --surface-2: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.12);
    --text-primary: #f5f5f7;
    --text-secondary: rgba(245,245,247,0.55);
    --accent: #4fc3f7;
    --accent-warm: #ffb347;
    --radius: 22px;
    --radius-sm: 14px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow-x: hidden;
  }

  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(79,195,247,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,179,71,0.10) 0%, transparent 60%),
      #0a0a0f;
  }

  /* ── TOP BAR ───────────────────────── */
  .topbar {
    width: 100%;
    max-width: 400px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 4px 8px;
    animation: fadeDown 0.6s ease both;
  }

  .city-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }

  .city-label svg { opacity: 0.7; }

  .date-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
    letter-spacing: 0.03em;
  }

  /* ── MAIN CARD ─────────────────────── */
  .main-card {
    width: 100%;
    max-width: 400px;
    margin-top: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(30px) saturate(1.6);
    -webkit-backdrop-filter: blur(30px) saturate(1.6);
    padding: 36px 28px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    position: relative;
    overflow: hidden;
  }

  .main-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  }

  /* Weather icon large */
  .weather-icon-large {
    font-size: 80px;
    line-height: 1;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 24px rgba(79,195,247,0.35));
    animation: floatIcon 4s ease-in-out infinite;
  }

  /* Time */
  .time-display {
    font-size: 72px;
    font-weight: 300;
    letter-spacing: -3px;
    color: var(--text-primary);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.75) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .time-seconds {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -1px;
    color: var(--text-secondary);
    align-self: flex-end;
    margin-bottom: 10px;
    margin-left: 2px;
    font-variant-numeric: tabular-nums;
    background: none;
    -webkit-background-clip: unset;
    -webkit-text-fill-color: rgba(245,245,247,0.45);
  }

  .time-row {
    display: flex;
    align-items: baseline;
    gap: 0;
  }

  /* Temperature */
  .temperature {
    font-size: 42px;
    font-weight: 200;
    letter-spacing: -1px;
    margin-top: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, #81d4fa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .weather-desc {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    margin-top: 4px;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.12em;
  }

  /* ── STATS ROW ──────────────────────── */
  .stats-row {
    width: 100%;
    max-width: 400px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.25s both;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 16px 12px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    overflow: hidden;
    transition: background 0.2s;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  }

  .stat-icon { font-size: 20px; }
  .stat-value {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.10em;
    font-weight: 600;
  }

  /* ── FORECAST ROW ───────────────────── */
  .forecast-section {
    width: 100%;
    max-width: 400px;
    margin-top: 12px;
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.35s both;
  }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    font-weight: 600;
    margin-bottom: 8px;
    padding-left: 4px;
  }

  .forecast-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .forecast-scroll::-webkit-scrollbar { display: none; }

  .forecast-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 62px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .forecast-item.now {
    border-color: rgba(79,195,247,0.4);
    background: rgba(79,195,247,0.08);
  }

  .forecast-item::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  }

  .forecast-time { font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.06em; }
  .forecast-emoji { font-size: 22px; }
  .forecast-temp { font-size: 14px; font-weight: 600; color: var(--text-primary); }

  /* ── SUNRISE/SUNSET ─────────────────── */
  .sun-card {
    width: 100%;
    max-width: 400px;
    margin-top: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.45s both;
    position: relative;
    overflow: hidden;
  }

  .sun-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  }

  .sun-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .sun-emoji { font-size: 22px; }
  .sun-time { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .sun-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.10em; font-weight: 600; }

  .sun-arc {
    flex: 1;
    margin: 0 16px;
    position: relative;
    height: 40px;
  }

  .sun-arc svg { width: 100%; height: 100%; }

  /* ── LOADING ─────────────────────────── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 40px 0;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text { font-size: 14px; color: var(--text-secondary); }

  /* ── ERROR ───────────────────────────── */
  .error-box {
    width: 100%;
    max-width: 400px;
    background: rgba(255,100,100,0.08);
    border: 1px solid rgba(255,100,100,0.2);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    font-size: 13px;
    color: rgba(255,150,150,0.9);
    text-align: center;
    margin-top: 8px;
    animation: fadeUp 0.5s ease both;
  }

  .retry-btn {
    margin-top: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 20px;
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .retry-btn:active { background: rgba(255,255,255,0.14); }

  /* ── ANIMATIONS ─────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes floatIcon {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── BOTTOM SAFE AREA ────────────────── */
  .spacer { height: 16px; flex-shrink: 0; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="city-label">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
    </svg>
    Нягань, ХМАО
  </div>
  <div class="date-label" id="dateLabel">—</div>
</div>

<!-- CONTENT -->
<div id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Загрузка погоды…</div>
  </div>
</div>

<div class="spacer"></div>

<script>
// ──────────────────────────────────────────
// Telegram Web App init
// ──────────────────────────────────────────
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  Telegram.WebApp.setHeaderColor('#0a0a0f');
  Telegram.WebApp.setBackgroundColor('#0a0a0f');
}

// ──────────────────────────────────────────
// NYAGAN TIMEZONE  UTC+5
// ──────────────────────────────────────────
const NYAGAN_TZ = 'Asia/Yekaterinburg'; // UTC+5

function getNyaganTime() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: NYAGAN_TZ }));
}

function pad(n) { return String(n).padStart(2, '0'); }

function formatTime(d) {
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function formatSeconds(d) {
  return pad(d.getSeconds());
}

function formatDate(d) {
  const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;
}

// ──────────────────────────────────────────
// WEATHER via Open-Meteo (free, no API key)
// Нягань: 62.1333, 65.3833
// ──────────────────────────────────────────
const LAT = 62.1333, LON = 65.3833;

const WMO_MAP = {
  0:  { icon: '☀️', label: 'Ясно' },
  1:  { icon: '🌤️', label: 'Преимущественно ясно' },
  2:  { icon: '⛅', label: 'Переменная облачность' },
  3:  { icon: '☁️', label: 'Пасмурно' },
  45: { icon: '🌫️', label: 'Туман' },
  48: { icon: '🌫️', label: 'Изморозь' },
  51: { icon: '🌦️', label: 'Лёгкая морось' },
  53: { icon: '🌦️', label: 'Морось' },
  55: { icon: '🌧️', label: 'Густая морось' },
  61: { icon: '🌧️', label: 'Слабый дождь' },
  63: { icon: '🌧️', label: 'Дождь' },
  65: { icon: '🌧️', label: 'Сильный дождь' },
  71: { icon: '🌨️', label: 'Слабый снег' },
  73: { icon: '❄️', label: 'Снег' },
  75: { icon: '❄️', label: 'Сильный снег' },
  77: { icon: '🌨️', label: 'Снежная крупа' },
  80: { icon: '🌦️', label: 'Ливень' },
  81: { icon: '🌧️', label: 'Ливень' },
  82: { icon: '⛈️', label: 'Сильный ливень' },
  85: { icon: '🌨️', label: 'Снегопад' },
  86: { icon: '🌨️', label: 'Сильный снегопад' },
  95: { icon: '⛈️', label: 'Гроза' },
  96: { icon: '⛈️', label: 'Гроза с градом' },
  99: { icon: '⛈️', label: 'Гроза с крупным градом' },
};

function wmoInfo(code) {
  return WMO_MAP[code] || WMO_MAP[Math.floor(code/10)*10] || { icon: '🌡️', label: 'Нет данных' };
}

async function fetchWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
    + `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weathercode,apparent_temperature`
    + `&hourly=temperature_2m,weathercode`
    + `&daily=sunrise,sunset`
    + `&timezone=Asia%2FYekaterinburg`
    + `&forecast_days=1`;

  const res = await fetch(url);
  if (!res.ok) throw new Error('Ошибка сети');
  return res.json();
}

// ──────────────────────────────────────────
// RENDER
// ──────────────────────────────────────────
let timeInterval = null;

function startClock() {
  function tick() {
    const now = getNyaganTime();
    const el = document.getElementById('liveClock');
    const sec = document.getElementById('liveSeconds');
    if (el) el.textContent = formatTime(now);
    if (sec) sec.textContent = formatSeconds(now);
    document.getElementById('dateLabel').textContent = formatDate(now);
  }
  tick();
  if (timeInterval) clearInterval(timeInterval);
  timeInterval = setInterval(tick, 1000);
}

function buildHourlyForecast(hourly) {
  const now = getNyaganTime();
  const currentHour = now.getHours();

  // Pick next 6 hours
  const items = [];
  for (let i = 0; i < hourly.time.length && items.length < 7; i++) {
    const t = new Date(hourly.time[i]);
    const h = t.getHours();
    if (t >= now || (h >= currentHour)) {
      items.push({
        hour: h,
        temp: Math.round(hourly.temperature_2m[i]),
        code: hourly.weathercode[i],
        isCurrent: items.length === 0,
      });
    }
    if (items.length === 7) break;
  }

  return items.map(it => `
    <div class="forecast-item ${it.isCurrent ? 'now' : ''}">
      <div class="forecast-time">${it.isCurrent ? 'Сейчас' : pad(it.hour)+':00'}</div>
      <div class="forecast-emoji">${wmoInfo(it.code).icon}</div>
      <div class="forecast-temp">${it.temp > 0 ? '+' : ''}${it.temp}°</div>
    </div>
  `).join('');
}

function sunArcSVG(sunriseStr, sunsetStr) {
  // simple decorative arc
  return `
    <svg viewBox="0 0 100 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 36 Q50 -8 96 36" stroke="rgba(255,179,71,0.35)" stroke-width="1.5" stroke-dasharray="4 3"/>
      <circle cx="50" cy="14" r="4" fill="#ffb347" opacity="0.9"/>
    </svg>
  `;
}

function render(data) {
  const cur = data.current;
  const temp = Math.round(cur.temperature_2m);
  const feelsLike = Math.round(cur.apparent_temperature);
  const humidity = Math.round(cur.relative_humidity_2m);
  const wind = Math.round(cur.wind_speed_10m);
  const code = cur.weathercode;
  const { icon, label } = wmoInfo(code);

  const sunrise = data.daily.sunrise[0].split('T')[1].slice(0,5);
  const sunset  = data.daily.sunset[0].split('T')[1].slice(0,5);

  const hourlyHTML = buildHourlyForecast(data.hourly);

  document.getElementById('content').innerHTML = `
    <!-- Main card -->
    <div class="main-card">
      <div class="weather-icon-large">${icon}</div>

      <div class="time-row">
        <div class="time-display" id="liveClock">--:--</div>
        <div class="time-seconds" id="liveSeconds">--</div>
      </div>

      <div class="temperature">${temp > 0 ? '+' : ''}${temp}°C</div>
      <div class="weather-desc">${label}</div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">🌡️</div>
        <div class="stat-value">${feelsLike > 0 ? '+' : ''}${feelsLike}°</div>
        <div class="stat-label">Ощущается</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💧</div>
        <div class="stat-value">${humidity}%</div>
        <div class="stat-label">Влажность</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💨</div>
        <div class="stat-value">${wind}<span style="font-size:11px;font-weight:400"> км/ч</span></div>
        <div class="stat-label">Ветер</div>
      </div>
    </div>

    <!-- Hourly forecast -->
    <div class="forecast-section">
      <div class="section-title">Прогноз по часам</div>
      <div class="forecast-scroll">${hourlyHTML}</div>
    </div>

    <!-- Sunrise / Sunset -->
    <div class="sun-card">
      <div class="sun-item">
        <div class="sun-emoji">🌅</div>
        <div class="sun-time">${sunrise}</div>
        <div class="sun-label">Рассвет</div>
      </div>
      <div class="sun-arc">${sunArcSVG()}</div>
      <div class="sun-item">
        <div class="sun-emoji">🌇</div>
        <div class="sun-time">${sunset}</div>
        <div class="sun-label">Закат</div>
      </div>
    </div>
  `;

  startClock();
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="main-card" style="min-height:180px; justify-content:center;">
      <div class="time-row">
        <div class="time-display" id="liveClock">--:--</div>
        <div class="time-seconds" id="liveSeconds">--</div>
      </div>
      <div class="weather-desc" style="margin-top:8px;">Нягань · UTC+5</div>
    </div>
    <div class="error-box">
      ${msg}<br>
      <button class="retry-btn" onclick="init()">Повторить</button>
    </div>
  `;
  startClock();
}

async function init() {
  document.getElementById('content').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Загрузка погоды…</div>
    </div>
  `;
  document.getElementById('dateLabel').textContent = formatDate(getNyaganTime());

  try {
    const data = await fetchWeather();
    render(data);
  } catch(e) {
    showError('Не удалось загрузить погоду. Проверьте интернет-соединение.');
  }
}

init();
</script>
</body>
</html>
