        </div>

        <footer>
            Нягань • 2026
        </footer>
    </div>

    <script>
        // Обновление времени и даты
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            const formatted = now.toLocaleDateString('ru-RU', options).replace(',', '');
            document.getElementById('datetime').textContent = formatted;
        }

        // Погода через Open-Meteo
        async function loadWeather() {
            const lat = 62.14;
            const lon = 65.39;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=Asia/Yekaterinburg`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                const temp = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;
                
                document.getElementById('temperature').textContent = temp + '°';
                
                // Простая интерпретация кода погоды
                let desc = "Ясно";
                let icon = "☀️";
                
                if ([3, 45, 48].includes(code)) { desc = "Облачно"; icon = "☁️"; }
                else if ([51, 53, 55, 61, 63, 65].includes(code)) { desc = "Дождь"; icon = "🌧️"; }
                else if ([71, 73, 75, 77].includes(code)) { desc = "Снег"; icon = "❄️"; }
                else if ([80, 81, 82].includes(code)) { desc = "Ливень"; icon = "🌦️"; }
                
                document.getElementById('weather-desc').textContent = desc;
                document.getElementById('weather-icon').textContent = icon;
                
            } catch (e) {
                document.getElementById('weather-desc').textContent = "Не удалось загрузить погоду";
            }
        }

        // Запуск
        window.onload = () => {
            updateDateTime();
            setInterval(updateDateTime, 30000); // обновление каждые 30 сек
            loadWeather();
        };
    </script>
</body>
